services:
  frontend:
    image: nginx:alpine
    container_name: Hackaton_frontend
    ports:
# to expose the project into a lan network
      - "<ip given by router>:8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
      - ./frontend/infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
# to include the frontend into the local docker network
    networks:
          - app-network
  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
# container name is also an alias to access to the container in the local docker network in a http request, to check it, visit the nginx.conf from frontend/infra
      container_name: fastapi_backend
# to expose backend to the host machine in order to access to admin endpoints
      ports:
        - "127.0.0.1:8000:8000"
# to expose backend into the local docker network
      expose:
        - "8000" 
      volumes:
        - ./backend:/app
      environment:
        - PORT=8000
      restart: unless-stopped
# to include the backend into the local docker network
      networks:
            - app-network  
# to create docker network for the project
networks:
# which network resource is it required to use
  app-network:
    driver: bridge

