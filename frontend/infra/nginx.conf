server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html/client;
        index client.html;
        try_files $uri $uri/ /client.html;
    }

    location /api/ {
        proxy_pass http://fastapi_backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}